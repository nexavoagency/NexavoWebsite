<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Nexavo Dashboard</title>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { width: 100%; max-width: 420px; padding: 0 20px; z-index: 2; }
    .login-card {
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 48px 40px;
      box-shadow: var(--glow-gold), 0 30px 80px rgba(0,0,0,0.6);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 {
      font-family: 'Playfair Display',serif; font-size: 2rem; font-weight: 900;
      color: var(--gold); letter-spacing: 1px;
    }
    .login-logo p { color: var(--white-muted); font-size: 0.75rem; margin-top: 5px; letter-spacing: 3px; font-family: 'DM Mono',monospace; text-transform: uppercase; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group label {
      font-family:'DM Mono',monospace; font-weight:500; font-size:0.72rem;
      letter-spacing:2px; color:var(--gold); text-transform:uppercase;
    }
    .form-group input {
      background: rgba(201,168,76,0.05); border: 1px solid var(--border-light);
      border-radius: 4px; padding: 13px 16px; color: var(--white);
      font-family: 'DM Sans',sans-serif; font-size: 0.93rem; width: 100%;
      transition: all 0.25s; outline: none;
    }
    .form-group input:focus { border-color: var(--gold); box-shadow: var(--glow-gold); }
    .login-btn {
      padding: 13px; background: var(--gradient-gold);
      border: none; border-radius: 4px; color: var(--navy-deep);
      font-family: 'DM Sans',sans-serif; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; letter-spacing: 2px; transition: all 0.25s;
      box-shadow: var(--glow-gold); width: 100%; text-transform: uppercase;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .error-msg {
      background: rgba(200,50,50,0.1); border: 1px solid rgba(200,50,50,0.25);
      border-radius: 4px; padding: 11px 15px;
      color: #f87171; font-size: 0.83rem; text-align: center; display: none;
      font-family: 'DM Mono',monospace;
    }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: var(--white-muted); text-decoration: none; font-size: 0.83rem; transition: color 0.25s; }
    .back-link a:hover { color: var(--gold); }
    .lock-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-6px)}
      80%{transform:translateX(6px)}
    }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="login-box">
  <div class="login-card" id="login-card">
    <div class="login-logo">
      <span class="lock-icon">🔐</span>
      <h1>Nexavo</h1>
      <p>Admin Dashboard</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password"/>
      </div>
      <div class="error-msg" id="error-msg">⚠ Invalid credentials. Please try again.</div>
      <button type="button" class="login-btn" id="login-btn">Access Dashboard</button>
    </div>
    <div class="back-link"><a href="../index.html">← Back to Website</a></div>
  </div>
</div>

<script src="../main.js"></script>
<script>
  /*
   * IMPORTANT: Do not store credentials in client-side code.
   * In production, replace this with a server-side authentication
   * endpoint (e.g., POST /api/auth) that validates against a
   * hashed password store.
   *
   * The placeholder below is intentionally left for you to
   * wire up to your backend. Never commit real credentials
   * to source files.
   */
  const SESSION_KEY = 'nexavo_admin';

  async function doLogin() {
    const u   = document.getElementById('username').value.trim();
    const p   = document.getElementById('password').value.trim();
    const err = document.getElementById('error-msg');
    const btn = document.getElementById('login-btn');
    const card= document.getElementById('login-card');

    if (!u || !p) {
      err.textContent = '⚠ Please enter both username and password.';
      err.style.display = 'block';
      return;
    }

    btn.textContent = 'Verifying...';
    btn.disabled = true;

    /*
     * TODO: Replace the block below with a real fetch() call to
     * your server-side auth endpoint, e.g.:
     *
     *   const res = await fetch('/api/login', {
     *     method: 'POST',
     *     headers: { 'Content-Type': 'application/json' },
     *     body: JSON.stringify({ username: u, password: p })
     *   });
     *   const ok = res.ok;
     *
     * For local development only, you can use a temporary
     * environment variable or .env file — never hardcode.
     */
    const ok = false; // Replace with real auth check

    if (ok) {
      btn.textContent = '✓ Access Granted';
      btn.style.background = 'linear-gradient(135deg,#4caf50,#2e7d32)';
      btn.style.color = '#fff';
      sessionStorage.setItem(SESSION_KEY, 'true');
      setTimeout(() => { window.location.href = '../panel.html'; }, 800);
    } else {
      err.textContent = '⚠ Invalid credentials. Please try again.';
      err.style.display = 'block';
      document.getElementById('password').value = '';
      card.style.animation = 'shake 0.4s ease';
      btn.textContent = 'Access Dashboard';
      btn.disabled = false;
      setTimeout(() => {
        err.style.display = 'none';
        card.style.animation = '';
      }, 3000);
    }
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  ['password','username'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); })
  );

  if (sessionStorage.getItem(SESSION_KEY) === 'true') {
    window.location.href = '../panel.html';
  }
</script>
</body>
</html>
